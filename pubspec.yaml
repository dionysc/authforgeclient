name: authforgeclient
description: "Flutter client for AuthForge API, demonstrating secure authentication, token management, and real-world API integration."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Models / Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.8
  freezed: ^2.5.2
  json_serializable: ^6.7.1

